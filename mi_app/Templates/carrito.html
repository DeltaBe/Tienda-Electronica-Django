<div class="container my-5">
    <h2 class="mb-4">Tu Carrito de Compras</h2>
    <table class="table align-middle">
        <thead>
            <tr>
                <th>Producto</th>
                <th>Cantidad</th>
                <th>Precio Unitario</th>
                <th>Subtotal</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody>
            {% for id, item in request.session.carrito.items %}
            <tr>
                <td>{{ item.nombre }}</td>
                <td>{{ item.cantidad }}</td>
                <td>${{ item.precio }}</td>
                <td>${{ item.total }}</td>
                <td>
                    <a href="{% url 'eliminar' item.dispositivo_id %}" class="btn btn-danger btn-sm">Quitar</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="5" class="text-center">El carrito está vacío.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <div class="text-end">
        <a href="{% url 'home' %}" class="btn btn-secondary">Seguir Comprando</a>
        <button class="btn btn-success">Finalizar Compra</button>
    </div>
</div>
